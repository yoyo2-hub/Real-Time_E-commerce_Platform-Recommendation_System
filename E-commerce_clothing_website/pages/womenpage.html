<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/navbar.css">
  <link rel="stylesheet" href="/styles/products.css">
  <link rel="stylesheet" href="/styles/womenpage.css">
</head>
  <body data-type="women">
    <div id="navbar-placeholder"></div>
    <div id="products-container" class="product-list"></div>

    <script>
      fetch('navbar.html') // Load navbar.html into the placeholder
        .then(response => response.text())
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
        })
        .catch(error => console.error('Error loading navbar:', error));
    </script>

    <script src="/dynamic/script.js"></script>
    <script>
        loadProducts("women"); // load only women products
    </script>
</body>
</html>
