<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="/styles/sign.css">
</head>
<body>

  <div>
    <img src="/images/logoR.png" alt="logo" class="logo">
  </div>

  <div>
    <h2 class="title">Create Account</h2>
    <form action="/signUp" method="post">

      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Your name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>

      <div class="terms-row">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">By creating an account, you accept our Terms and Conditions and confirm that you have read our Privacy Policy.</label>
      </div>

      <input type="submit" value="Create Account" class="account_button">
    </form>

    <p>Already have an account? <a href="/pages/signIn.html">Login here</a></p>
  </div>

</body>
</html>
