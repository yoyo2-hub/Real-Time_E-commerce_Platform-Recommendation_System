<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/styles/sign.css">
</head>
<body>

  <div>
    <img src="/images/logoR.png" alt="logo" class="logo">
  </div>

  <div>
    <h2 class="title">LOGIN</h2>
    <form action="/signIn" method="post">

      <label for="email">Email</label>
      <input type="text" id="email" name="email" placeholder="your@email.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>

      <!-- <input type="submit" value="Login" class="account_button"> -->
    </form>
    <button type="button" class="account_button" onclick="window.location.href='/pages/home.html'">Login</button>

    <p>Don't have an account?</p>
    <button class="account_button" onclick="window.location.href='/pages/signUp.html'">
      Create Your Account
    </button>
  </div>

</body>
</html>
